<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿坝县干部职工通讯录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }

        .search-bar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .search-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-group {
            flex: 1;
            min-width: 200px;
        }

        .search-group label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .search-group input,
        .search-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-group input:focus,
        .search-group select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-group input::placeholder {
            color: #999;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stats-item {
            color: white;
            text-align: center;
        }

        .stats-item .number {
            font-size: 2rem;
            font-weight: 700;
        }

        .stats-item .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .contact-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .contact-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-info h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-info .title {
            font-size: 0.9rem;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-details {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }

        .detail-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            font-size: 0.95rem;
            color: #555;
        }

        .detail-item .icon {
            width: 20px;
            margin-right: 10px;
            color: #667eea;
        }

        .detail-item .value {
            flex: 1;
            word-break: break-all;
        }

        .phone-link {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .phone-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .operator-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .operator-badge.移动 {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .operator-badge.联通 {
            background: #e3f2fd;
            color: #1565c0;
        }

        .operator-badge.电信 {
            background: #fff3e0;
            color: #e65100;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 40px;
            gap: 10px;
        }

        .pagination button {
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .pagination button:hover:not(:disabled) {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination span {
            color: white;
            font-size: 1rem;
            padding: 0 10px;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .no-results h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .no-results p {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .search-row {
                flex-direction: column;
            }

            .contacts-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                flex-direction: column;
                gap: 15px;
            }

            .pagination button {
                padding: 8px 12px;
                font-size: 0.9rem;
            }
        }

        #loginPage {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-card .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .login-card h2 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #666;
            margin-bottom: 30px;
        }

        .login-form {
            text-align: left;
        }

        .login-form label {
            display: block;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .login-form input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            margin-bottom: 20px;
        }

        .login-form input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #e53935;
            font-size: 0.85rem;
            margin-top: -15px;
            margin-bottom: 15px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .password-hint {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #888;
            text-align: left;
        }

        .password-hint strong {
            color: #666;
        }
    </style>
</head>
<body>
    <div id="loginPage">
        <div class="login-card">
            <div class="logo">🔐</div>
            <h2>通讯录系统</h2>
            <p>请输入密码以访问通讯录</p>
            <div class="login-form">
                <label for="passwordInput">密码</label>
                <input type="password" id="passwordInput" placeholder="请输入密码" autocomplete="off">
                <div class="error-message" id="errorMsg">密码错误，请重试</div>
                <button class="login-btn" id="loginBtn">登录</button>
            </div>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="container">
            <header>
                <h1>📇 阿坝县干部职工通讯录</h1>
                <p>全县干部职工联系方式查询系统</p>
            </header>

        <div class="search-bar">
            <div class="search-row">
                <div class="search-group">
                    <label>姓名/电话号码</label>
                    <input type="text" id="searchInput" placeholder="输入姓名或电话号码">
                </div>
                <div class="search-group">
                    <label>单位名称</label>
                    <select id="unitSelect">
                        <option value="">全部单位</option>
                    </select>
                </div>
                <div class="search-group">
                    <label>人员类别</label>
                    <select id="categorySelect">
                        <option value="">全部类别</option>
                    </select>
                </div>
                <div class="search-group">
                    <label>运营商</label>
                    <select id="operatorSelect">
                        <option value="">全部运营商</option>
                        <option value="移动">移动</option>
                        <option value="联通">联通</option>
                        <option value="电信">电信</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stats-item">
                <div class="number" id="totalCount">0</div>
                <div class="label">总人数</div>
            </div>
            <div class="stats-item">
                <div class="number" id="mobileCount">0</div>
                <div class="label">移动用户</div>
            </div>
            <div class="stats-item">
                <div class="number" id="unicomCount">0</div>
                <div class="label">联通用户</div>
            </div>
            <div class="stats-item">
                <div class="number" id="telecomCount">0</div>
                <div class="label">电信用户</div>
            </div>
        </div>

        <div class="contacts-grid" id="contactsGrid">
        </div>

        <div class="pagination" id="pagination">
            <button id="prevBtn" disabled>上一页</button>
            <span id="pageInfo">第 1 / 1 页</span>
            <button id="nextBtn" disabled>下一页</button>
        </div>
        </div>
    </div>

    <script>
        let contacts = [];
        let filteredContacts = [];
        let currentPage = 1;
        const pageSize = 24;
        let storedHash = '';

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function initLogin() {
            try {
                const response = await fetch('config.json');
                const config = await response.json();
                storedHash = config.passwordHash;
            } catch (e) {
                console.error('加载配置失败:', e);
            }

            const loginBtn = document.getElementById('loginBtn');
            const passwordInput = document.getElementById('passwordInput');
            const errorMsg = document.getElementById('errorMsg');

            loginBtn.addEventListener('click', handleLogin);
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });

            async function handleLogin() {
                const inputPassword = passwordInput.value.trim();
                if (!inputPassword || !storedHash) {
                    errorMsg.style.display = 'block';
                    setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
                    return;
                }

                const inputHash = await sha256(inputPassword);
                if (inputHash === storedHash) {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    loadContacts();
                } else {
                    errorMsg.style.display = 'block';
                    passwordInput.value = '';
                    setTimeout(() => {
                        errorMsg.style.display = 'none';
                    }, 3000);
                }
            }
        }

        async function loadContacts() {
            try {
                const response = await fetch('contacts.json');
                contacts = await response.json();
                
                filteredContacts = contacts.filter(c => c.姓名 && c.电话号码);
                
                setupFilters();
                updateStats();
                renderContacts();
            } catch (error) {
                console.error('加载通讯录失败:', error);
            }
        }

        function setupFilters() {
            const units = [...new Set(filteredContacts.map(c => c.单位名称).filter(Boolean))].sort();
            const categories = [...new Set(filteredContacts.map(c => c.人员类别).filter(Boolean))].sort();

            const unitSelect = document.getElementById('unitSelect');
            units.forEach(unit => {
                const option = document.createElement('option');
                option.value = unit;
                option.textContent = unit;
                unitSelect.appendChild(option);
            });

            const categorySelect = document.getElementById('categorySelect');
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categorySelect.appendChild(option);
            });

            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('unitSelect').addEventListener('change', handleSearch);
            document.getElementById('categorySelect').addEventListener('change', handleSearch);
            document.getElementById('operatorSelect').addEventListener('change', handleSearch);

            document.getElementById('prevBtn').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderContacts();
                }
            });

            document.getElementById('nextBtn').addEventListener('click', () => {
                const maxPage = Math.ceil(filteredContacts.length / pageSize);
                if (currentPage < maxPage) {
                    currentPage++;
                    renderContacts();
                }
            });
        }

        function handleSearch() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const selectedUnit = document.getElementById('unitSelect').value;
            const selectedCategory = document.getElementById('categorySelect').value;
            const selectedOperator = document.getElementById('operatorSelect').value;

            filteredContacts = contacts.filter(c => {
                if (!c.姓名 || !c.电话号码) return false;
                
                const matchName = c.姓名.toLowerCase().includes(searchText);
                const matchPhone = String(c.电话号码).includes(searchText);
                const matchUnit = !selectedUnit || c.单位名称 === selectedUnit;
                const matchCategory = !selectedCategory || c.人员类别 === selectedCategory;
                const matchOperator = !selectedOperator || c.运营商 === selectedOperator;

                return (matchName || matchPhone) && matchUnit && matchCategory && matchOperator;
            });

            currentPage = 1;
            updateStats();
            renderContacts();
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = filteredContacts.length;
            document.getElementById('mobileCount').textContent = filteredContacts.filter(c => c.运营商 === '移动').length;
            document.getElementById('unicomCount').textContent = filteredContacts.filter(c => c.运营商 === '联通').length;
            document.getElementById('telecomCount').textContent = filteredContacts.filter(c => c.运营商 === '电信').length;
        }

        function renderContacts() {
            const grid = document.getElementById('contactsGrid');
            const maxPage = Math.ceil(filteredContacts.length / pageSize);
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageContacts = filteredContacts.slice(startIndex, endIndex);

            document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${maxPage} 页`;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= maxPage;

            if (pageContacts.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <h3>未找到匹配的联系人</h3>
                        <p>请尝试调整搜索条件</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = pageContacts.map(contact => {
                const phone = String(contact.电话号码);
                const avatar = contact.姓名 ? contact.姓名.charAt(0) : '?';
                return `
                    <div class="contact-card">
                        <div class="contact-header">
                            <div class="avatar">${avatar}</div>
                            <div class="contact-info">
                                <h3>${contact.姓名 || ''}</h3>
                                <div class="title">${contact.职务 || ''}</div>
                            </div>
                        </div>
                        <div class="contact-details">
                            <div class="detail-item">
                                <span class="icon">🏢</span>
                                <span class="value">${contact.单位名称 || ''}</span>
                            </div>
                            <div class="detail-item">
                                <span class="icon">👤</span>
                                <span class="value">${contact.人员类别 || ''}</span>
                            </div>
                            <div class="detail-item">
                                <span class="icon">📞</span>
                                <span class="value"><a href="tel:${phone}" class="phone-link">${phone}</a> ${contact.运营商 ? `<span class="operator-badge ${contact.运营商}">${contact.运营商}</span>` : ''}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        initLogin();
    </script>
</body>
</html>
